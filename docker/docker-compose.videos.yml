services:
  videos:
    build:
      context: ../services/videos
    container_name: videos-service
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://${VIDEOS_MONGO_USER}:${VIDEOS_MONGO_PASSWORD}@videos-db:27017/${VIDEOS_MONGO_DB}?authSource=admin
      MONGO_DB: ${VIDEOS_MONGO_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8001:8001"
    volumes:
      - ../services/videos/src:/app/src
    entrypoint: [ "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload" ]
    networks:
      - vsl-main

  videos-db:
    image: mongo:8
    container_name: videos-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${VIDEOS_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${VIDEOS_MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${VIDEOS_MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - ../data/videos/mongodb/data:/data/db
    networks:
      - vsl-main
