services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../data/minio:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio-stream.rule=PathPrefix(`/stream/videos/`)
      - traefik.http.routers.minio-stream.entrypoints=web
      - traefik.http.routers.minio-stream.middlewares=minio-strip-prefix
      - traefik.http.middlewares.minio-strip-prefix.replacepathregex.regex=^/stream/videos/(.*)
      - traefik.http.middlewares.minio-strip-prefix.replacepathregex.replacement=/videos-ready/$$1
      - traefik.http.services.minio-stream.loadbalancer.server.port=9000
    networks:
      - vsl-main

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      sh -c "
        until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
          sleep 1
        done
        mc mb --ignore-existing local/videos-original
        mc mb --ignore-existing local/videos-processed
        mc mb --ignore-existing local/videos-ready
        mc anonymous set download local/videos-ready
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - vsl-main
